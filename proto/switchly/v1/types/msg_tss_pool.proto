syntax = "proto3";
package types;

option go_package = "github.com/switchlyprotocol/switchlynode/v3/x/switchly/types";
option (gogoproto.goproto_getters_all) = false;

import "types/type_blame.proto";
import "types/type_keygen.proto";
import "gogoproto/gogo.proto";
import "amino/amino.proto";

message MsgTssPool {
  option (amino.name) = "switchly/TssPool";

  string id = 1 [(gogoproto.customname) = "ID"];
  string pool_pub_key = 2 [(gogoproto.casttype) = "github.com/switchlyprotocol/switchlynode/v3/common.PubKey"];
  KeygenType keygen_type = 3 [(gogoproto.casttype) = "KeygenType", (amino.encoding) = "keygen_type"];
  repeated string pub_keys = 4;
  int64 height = 5;
  Blame blame = 6 [(gogoproto.nullable) = false];
  repeated string chains = 7;
  bytes signer = 8  [(gogoproto.casttype) = "github.com/cosmos/cosmos-sdk/types.AccAddress", (amino.encoding) = "bech32"];
  int64 keygen_time = 9;
  bytes keyshares_backup = 10;
  bytes secp256k1_signature = 11;
  // Optional ed25519 (EdDSA) group public key for the Stellar vault, alongside the secp256k1
  // pool_pub_key. Empty for ECDSA-only churns (wire-identical to pre-EdDSA nodes); set once a
  // version-gated EdDSA keygen runs. Stored into the vault and used to derive/sign Stellar.
  string ed25519_pub_key = 12 [(gogoproto.casttype) = "github.com/switchlyprotocol/switchlynode/v3/common.PubKey"];
}
